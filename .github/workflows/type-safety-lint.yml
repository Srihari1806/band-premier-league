name: Type Safety & Lint

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  type-safety-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run ESLint
        run: bun run lint
        continue-on-error: false

      - name: TypeScript type checking
        run: bun tsc --noEmit
        continue-on-error: false

      - name: Format check
        run: bun prettier --check .
        continue-on-error: true

      - name: Report results
        if: always()
        run: |
          echo "✅ Type safety and linting checks completed"
